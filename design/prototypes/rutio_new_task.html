<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390px, initial-scale=1.0">
<title>Rutio – New Task</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

  :root {
    --cream: #f5ede0;
    --cream-light: #faf5ee;
    --camel: #b8895a;
    --brown: #3d2010;
    --sage: #7a9e7e;
    --amber: #c9a84c;
    --muted: #c4b09a;
    --card-bg: rgba(255,255,255,0.72);
    --border: rgba(184,137,90,0.12);
  }

  body {
    background: #ddd5c8;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px 0;
    font-family: 'DM Sans', sans-serif;
  }

  .phone {
    width: 390px;
    min-height: 844px;
    background: var(--cream);
    border-radius: 48px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 40px 80px rgba(0,0,0,0.22), 0 0 0 1px rgba(255,255,255,0.4) inset;
  }

  /* Status bar */
  .status-bar {
    height: 50px;
    padding: 16px 28px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .status-time {
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 15px;
    color: var(--brown);
  }
  .status-icons {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .status-icons svg { opacity: 0.7; }

  /* Sheet handle */
  .handle {
    width: 36px;
    height: 4px;
    background: var(--muted);
    border-radius: 2px;
    margin: 10px auto 0;
    opacity: 0.5;
  }

  /* Nav */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px 10px;
  }
  .nav-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: var(--camel);
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px 4px;
    letter-spacing: 0.01em;
  }
  .nav-btn.save {
    color: var(--muted);
    font-weight: 400;
  }
  .nav-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--brown);
    letter-spacing: 0.02em;
  }

  /* Segment */
  .segment-wrap {
    padding: 0 20px 14px;
  }
  .segment {
    display: flex;
    background: rgba(184,137,90,0.1);
    border-radius: 10px;
    padding: 3px;
    gap: 0;
  }
  .seg-btn {
    flex: 1;
    padding: 7px 0;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    border: none;
    cursor: pointer;
    border-radius: 8px;
    letter-spacing: 0.01em;
    transition: all 0.2s ease;
  }
  .seg-btn.active {
    background: var(--brown);
    color: #fff;
    box-shadow: 0 2px 8px rgba(61,32,16,0.22);
  }
  .seg-btn.inactive {
    background: transparent;
    color: var(--camel);
  }

  /* Content */
  .content {
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Card */
  .card {
    background: var(--card-bg);
    border-radius: 14px;
    border: 1px solid var(--border);
    backdrop-filter: blur(8px);
    overflow: hidden;
  }

  /* Text inputs */
  .text-group {
    padding: 0;
  }
  .text-input {
    width: 100%;
    padding: 14px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 400;
    color: var(--brown);
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    display: block;
  }
  .text-input::placeholder {
    color: var(--muted);
  }
  .text-input.title-input {
    font-size: 15px;
    font-weight: 500;
    min-height: 46px;
  }
  .text-input.desc-input {
    font-size: 13.5px;
    color: var(--brown);
    opacity: 0.8;
    min-height: 38px;
    padding-top: 0;
    padding-bottom: 12px;
  }
  .divider-line {
    height: 1px;
    background: var(--border);
    margin: 0 16px;
  }

  /* Section label */
  .section-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--camel);
    text-transform: uppercase;
    margin-bottom: -4px;
    padding-left: 2px;
  }

  /* Row item */
  .row-item {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    gap: 10px;
  }
  .row-item + .row-item {
    border-top: 1px solid var(--border);
  }
  .row-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: rgba(184,137,90,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .row-icon svg { opacity: 0.7; }
  .row-label {
    font-size: 14px;
    font-weight: 400;
    color: var(--brown);
    flex: 1;
  }
  .row-value {
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .row-value svg { opacity: 0.5; }

  /* Priority row */
  .priority-dots {
    display: flex;
    gap: 6px;
  }
  .pdot {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
  }
  .pdot.p1 { background: rgba(122,158,126,0.3); border-color: #7a9e7e; }
  .pdot.p2 { background: rgba(201,168,76,0.3); border-color: #c9a84c; }
  .pdot.p3 { background: rgba(184,137,90,0.3); border-color: #b8895a; }
  .pdot.active { transform: scale(1.2); box-shadow: 0 2px 6px rgba(0,0,0,0.15); }

  /* Category chips */
  .chips-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    padding: 12px 16px;
  }
  .chip {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 11px;
    border-radius: 20px;
    font-size: 12.5px;
    font-weight: 400;
    font-family: 'DM Sans', sans-serif;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    background: rgba(255,255,255,0.5);
    color: var(--brown);
    border-color: var(--border);
  }
  .chip-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .chip.selected {
    background: rgba(255,255,255,0.85);
  }
  /* colors */
  .chip[data-cat="mind"] .chip-dot { background: #7b6fa0; }
  .chip[data-cat="mind"].selected { border-color: #7b6fa0; color: #7b6fa0; }
  .chip[data-cat="spirit"] .chip-dot { background: #7a9e7e; }
  .chip[data-cat="spirit"].selected { border-color: #7a9e7e; color: #7a9e7e; }
  .chip[data-cat="body"] .chip-dot { background: #c87565; }
  .chip[data-cat="body"].selected { border-color: #c87565; color: #c87565; }
  .chip[data-cat="emoc"] .chip-dot { background: #c9848a; }
  .chip[data-cat="emoc"].selected { border-color: #c9848a; color: #c9848a; }
  .chip[data-cat="social"] .chip-dot { background: #6199b4; }
  .chip[data-cat="social"].selected { border-color: #6199b4; color: #6199b4; }
  .chip[data-cat="disc"] .chip-dot { background: #c9a84c; }
  .chip[data-cat="disc"].selected { border-color: #c9a84c; color: #c9a84c; }
  .chip[data-cat="personal"] .chip-dot { background: #b8895a; }
  .chip[data-cat="personal"].selected { border-color: #b8895a; color: #b8895a; }

  /* Home indicator */
  .home-indicator {
    width: 130px;
    height: 5px;
    background: var(--brown);
    border-radius: 3px;
    opacity: 0.18;
    margin: 18px auto 12px;
  }
</style>
</head>
<body>
<div class="phone">

  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-time">23:15</span>
    <div class="status-icons">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="#3d2010"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="#3d2010"/><rect x="9" y="0" width="3" height="12" rx="1" fill="#3d2010"/><rect x="13.5" y="0" width="2.5" height="12" rx="1" fill="#3d2010" opacity="0.3"/></svg>
      <svg width="16" height="12" viewBox="0 0 20 14" fill="none"><path d="M10 3.5C12.8 3.5 15.3 4.6 17.1 6.4L18.5 5C16.3 2.8 13.3 1.5 10 1.5C6.7 1.5 3.7 2.8 1.5 5L2.9 6.4C4.7 4.6 7.2 3.5 10 3.5Z" fill="#3d2010"/><path d="M10 7C11.9 7 13.6 7.8 14.8 9L16.2 7.6C14.6 6.1 12.4 5 10 5C7.6 5 5.4 6.1 3.8 7.6L5.2 9C6.4 7.8 8.1 7 10 7Z" fill="#3d2010"/><circle cx="10" cy="12" r="2" fill="#3d2010"/></svg>
      <svg width="28" height="13" viewBox="0 0 28 13" fill="none"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="#3d2010" stroke-opacity="0.35"/><rect x="2" y="2" width="20" height="9" rx="2" fill="#3d2010"/><path d="M25 4.5C25.8 4.9 26.5 5.6 26.5 6.5C26.5 7.4 25.8 8.1 25 8.5V4.5Z" fill="#3d2010" opacity="0.4"/></svg>
    </div>
  </div>

  <div class="handle"></div>

  <!-- Nav -->
  <div class="nav">
    <button class="nav-btn">Cancel</button>
    <span class="nav-title">New task</span>
    <button class="nav-btn save">Save</button>
  </div>

  <!-- Segment -->
  <div class="segment-wrap">
    <div class="segment">
      <button class="seg-btn active">Free task</button>
      <button class="seg-btn inactive">Linked to habit</button>
    </div>
  </div>

  <!-- Main content -->
  <div class="content">

    <!-- Text inputs card -->
    <div class="card text-group">
      <textarea class="text-input title-input" placeholder="What do you need to do?" rows="1"></textarea>
      <div class="divider-line"></div>
      <textarea class="text-input desc-input" placeholder="Description (optional)" rows="2"></textarea>
    </div>

    <!-- When -->
    <span class="section-label">When</span>
    <div class="card">
      <div class="row-item">
        <div class="row-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#b8895a" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <span class="row-label">Date</span>
        <span class="row-value">Select <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#c4b09a" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></span>
      </div>
      <div class="row-item">
        <div class="row-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#b8895a" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <span class="row-label">Time</span>
        <span class="row-value">No time <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#c4b09a" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></span>
      </div>
      <div class="row-item">
        <div class="row-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#b8895a" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </div>
        <span class="row-label">Reminder</span>
        <span class="row-value">None <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#c4b09a" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></span>
      </div>
    </div>

    <!-- Priority -->
    <span class="section-label">Priority</span>
    <div class="card">
      <div class="row-item">
        <div class="row-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#b8895a" stroke-width="2" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </div>
        <span class="row-label">Priority</span>
        <div class="priority-dots">
          <div class="pdot p1 active"></div>
          <div class="pdot p2"></div>
          <div class="pdot p3"></div>
        </div>
      </div>
    </div>

    <!-- Category -->
    <span class="section-label">Category</span>
    <div class="card">
      <div class="chips-wrap">
        <div class="chip selected" data-cat="mind"><div class="chip-dot"></div>Mind</div>
        <div class="chip" data-cat="spirit"><div class="chip-dot"></div>Spirit</div>
        <div class="chip" data-cat="body"><div class="chip-dot"></div>Body</div>
        <div class="chip" data-cat="emoc"><div class="chip-dot"></div>Emotional</div>
        <div class="chip" data-cat="social"><div class="chip-dot"></div>Social</div>
        <div class="chip" data-cat="disc"><div class="chip-dot"></div>Discipline</div>
        <div class="chip" data-cat="personal"><div class="chip-dot"></div>Personal</div>
      </div>
    </div>

  </div><!-- /content -->

  <div class="home-indicator"></div>
</div>

<script>
  // Segment toggle
  document.querySelectorAll('.seg-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.seg-btn').forEach(b => { b.className = 'seg-btn inactive'; });
      btn.className = 'seg-btn active';
    });
  });

  // Category chips
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      chip.classList.toggle('selected');
    });
  });

  // Priority dots
  document.querySelectorAll('.pdot').forEach(dot => {
    dot.addEventListener('click', () => {
      document.querySelectorAll('.pdot').forEach(d => d.classList.remove('active'));
      dot.classList.add('active');
    });
  });

  // Auto-resize textareas
  document.querySelectorAll('textarea').forEach(ta => {
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    });
  });
</script>
</body>
</html>
